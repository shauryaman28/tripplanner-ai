version: "3.9"

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: tripplanner_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tripplanner
      POSTGRES_PASSWORD: tripplanner_secret
      POSTGRES_DB: tripplanner_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripplanner -d tripplanner_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tripplanner_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: run the backend in Docker.
  # During development, prefer running locally:
  #   cd tripplanner-ai && pip install -r requirements.txt
  #   cd src/backend && uvicorn app.main:app --reload
  backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    container_name: tripplanner_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src/backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:
